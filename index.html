<!DOCTYPE html>
<html lang="ar" dir="rtl" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMO - تسجيل الدخول وإنشاء حساب</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Preconnect & Font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Preload Critical Logo Image for Instant rendering -->
    <link rel="preload" href="assets/logo_compressed_800.png" as="image" type="image/png">
    <style>
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.1) 0%, rgba(236, 72, 153, 0.05) 90%);
        }
        .lumo-gradient-text {
            background: linear-gradient(45deg, #a855f7, #ec4899, #f97316, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lumo-border-gradient {
            border-image: linear-gradient(45deg, #a855f7, #ec4899, #f97316) 1;
        }
        .custom-shadow {
            box-shadow: 0 10px 30px -10px rgba(168, 85, 247, 0.2);
        }
        
        /* Prevent text selection globally and remove tap highlighting on mobile */
        *, *::before, *::after {
            user-select: none !important;
            -webkit-user-select: none !important;
            -ms-user-select: none !important;
            -moz-user-select: none !important;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        /* Allow user input selection in inputs */
        input, textarea, [contenteditable="true"] {
            user-select: text !important;
            -webkit-user-select: text !important;
            -ms-user-select: text !important;
            -moz-user-select: text !important;
        }

        /* Prevent auto-zooming on focus by forcing 16px font-size on mobile inputs */
        input[type="text"], input[type="password"], input[type="tel"], input[type="email"] {
            font-size: 16px !important;
        }
        
        /* Fix to remove browser outline/focus border on all buttons */
        button, button:focus, button:active, button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        
        /* Ultra Smooth Absolute Sliding Transition (Anti-bug for RTL & Hidden containers) */
        .tab-indicator {
            transition: right 0.38s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.35s ease;
        }

        /* Force Hardware GPU Acceleration on animated & blurred components for maximum fluidity (60/120fps) */
        .tab-indicator, #main-card, img {
            will-change: transform, opacity, height, right;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            perspective: 1000px;
        }
    </style>
</head>
<body class="min-h-[100dvh] w-full flex items-center justify-center p-4 bg-slate-50 relative overflow-x-hidden select-none">

    <!-- Background decorative blur elements representing LUMO colors -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] rounded-full bg-purple-400/20 blur-[80px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[350px] h-[350px] rounded-full bg-orange-400/20 blur-[100px]"></div>
        <div class="absolute top-[40%] right-[-5%] w-[200px] h-[200px] rounded-full bg-green-400/10 blur-[60px]"></div>
    </div>

    <!-- Main Card Container -->
    <div id="main-card" class="w-full max-w-md bg-white/90 backdrop-blur-md rounded-3xl pt-5 pb-6 px-6 sm:pt-6 sm:pb-8 sm:px-8 custom-shadow border border-slate-100 z-10 transition-all duration-300">
        
        <!-- Header: Logo & Slogan -->
        <div class="text-center mb-5">
            <!-- Custom Styled LUMO Logo using Brand colors -->
            <div class="flex justify-center items-center -mt-2 mb-1">
                <img src="assets/logo_compressed_800.png" alt="LUMO Logo" class="h-16 w-auto object-contain" decoding="async" fetchpriority="high">
            </div>
            <p class="text-xs font-semibold text-slate-500 tracking-wider">كل فكرة بتلمع مع LUMO</p>
        </div>

        <!-- Auth Mode Switcher (Login vs Sign Up) -->
        <div class="relative flex p-1 mb-6 bg-slate-100 rounded-2xl">
            <button id="tab-login-btn" onclick="switchAuthMode('login')" class="flex-1 py-2.5 text-sm font-bold text-slate-800 relative z-10 rounded-xl transition-all duration-300 focus:outline-none">
                تسجيل الدخول
            </button>
            <button id="tab-register-btn" onclick="switchAuthMode('register')" class="flex-1 py-2.5 text-sm font-bold text-slate-500 relative z-10 rounded-xl transition-all duration-300 focus:outline-none">
                إنشاء حساب جديد
            </button>
            <!-- Sliding Active Background - Initialized at right: 4px -->
            <div id="auth-tab-indicator" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm tab-indicator" style="right: 4px;"></div>
        </div>

        <!-- Notification / Feedback Box -->
        <div id="alert-box" class="hidden mb-4 p-3 rounded-xl text-xs font-medium text-center transition-all duration-300"></div>

        <!-- ==================== FORM 1: LOGIN (تسجيل الدخول) ==================== -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <!-- Identifier Input -->
            <div class="space-y-1.5">
                <label id="login-identifier-label" class="text-xs font-bold text-slate-700 block">رقم الهاتف أو البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute right-3 top-3 text-slate-400">
                        <!-- Contact Icon -->
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </span>
                    <input type="text" id="login-identifier" required placeholder="يرجى إدخال رقم الهاتف أو البريد الإلكتروني" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                </div>
            </div>

            <!-- Password Input -->
            <div class="space-y-1.5">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-slate-700">كلمة السر</label>
                    <a href="#" onclick="showAlert('ميزة استعادة كلمة السر ستتوفر قريباً!', 'info')" class="text-[10px] text-purple-600 hover:underline">نسيت كلمة السر؟</a>
                </div>
                <div class="relative">
                    <span class="absolute right-3 top-3 text-slate-400">
                        <!-- Lock Icon -->
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </span>
                    <input type="password" id="login-password" required placeholder="••••••••" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                </div>
            </div>

            <!-- Action Button -->
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 text-white font-bold rounded-xl shadow-lg shadow-purple-500/20 hover:shadow-purple-500/30 active:scale-[0.98] transition-all text-sm mt-2">
                دخــــول
            </button>
        </form>

        <!-- ==================== FORM 2: REGISTER (إنشاء حساب) ==================== -->
        <div id="register-container" class="hidden space-y-4">
            
            <div class="text-center mb-2">
                <p class="text-xs text-slate-400">يرجى اختيار نوع الحساب للمتابعة</p>
            </div>
            
            <!-- Register Role Switch Tabs with sliding effect -->
            <div class="relative flex p-1 bg-slate-100 rounded-xl border border-slate-200/50">
                <button type="button" onclick="setRegisterRole('student')" id="reg-role-student" class="flex-1 py-2 text-xs font-bold relative z-10 rounded-lg transition-all duration-300 text-white focus:outline-none">
                    حساب طالب BTEC
                </button>
                <button type="button" onclick="setRegisterRole('company')" id="reg-role-company" class="flex-1 py-2 text-xs font-bold relative z-10 rounded-lg transition-all duration-300 text-slate-500 focus:outline-none">
                    حساب مستخدم / شركة
                </button>
                <!-- Register Role Slider Background Indicator - Initialized at right: 4px -->
                <div id="reg-role-indicator" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-gradient-to-l from-purple-600 to-pink-500 rounded-lg shadow-sm tab-indicator" style="right: 4px;"></div>
            </div>

            <!-- REGISTER: STUDENT FORM -->
            <form id="reg-student-form" onsubmit="handleRegisterStudent(event)" class="space-y-4">
                <!-- Name -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">الاسم الكامل للطالب</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- User Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input type="text" id="reg-student-name" required placeholder="مثال: أحمد علي" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Contact (Phone or Email) -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">رقم الهاتف أو البريد الإلكتروني</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- Contact Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </span>
                        <input type="text" id="reg-student-contact" required placeholder="مثال: student@lumo.com أو 079xxxxxxx" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- National ID -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">الرقم الوطني</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- ID Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.333 0 4 .667 4 2V15H3v-1c0-1.333 2.667-2 4-2z"></path></svg>
                        </span>
                        <input type="text" id="reg-student-id" required pattern="[0-9]{10}" title="الرقم الوطني الأردني يتكون من 10 أرقام" placeholder="مثال: 200xxxxxxx" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                    <span class="text-[10px] text-slate-400 block mr-1">يتكون الرقم الوطني الأردني من 10 خانات رقمية</span>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">كلمة السر</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- Lock Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="reg-student-password" required minlength="6" placeholder="••••••••" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Action Button for Student -->
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 text-white font-bold rounded-xl shadow-lg shadow-purple-500/20 hover:shadow-purple-500/30 active:scale-[0.98] transition-all text-sm mt-2">
                    إنشاء حساب طالب
                </button>
            </form>

            <!-- REGISTER: USER / COMPANY FORM -->
            <form id="reg-company-form" onsubmit="handleRegisterCompany(event)" class="space-y-4 hidden">
                <!-- Name -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">الاسم أو اسم الشركة</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- Building/User Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </span>
                        <input type="text" id="reg-company-name" required placeholder="مثال: شركة الحلول الإبداعية أو أحمد المحاميد" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Contact (Phone or Email) -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">رقم الهاتف أو البريد الإلكتروني</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- Contact Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </span>
                        <input type="text" id="reg-company-contact" required placeholder="مثال: info@company.com أو 079xxxxxxx" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-700 block">كلمة السر</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400">
                            <!-- Lock Icon -->
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="reg-company-password" required minlength="6" placeholder="••••••••" class="w-full text-right pr-11 pl-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/20 focus:border-purple-500 text-sm transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Action Button for Company -->
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 text-white font-bold rounded-xl shadow-lg shadow-purple-500/20 hover:shadow-purple-500/30 active:scale-[0.98] transition-all text-sm mt-2">
                    إنشاء حساب مستخدم / شركة
                </button>
            </form>
        </div>

        <!-- Footer terms info -->
        <p class="text-center text-[10px] text-slate-400 mt-6 leading-relaxed">
            باستمرارك بالدخول، فإنك توافق على <a href="#" class="text-purple-600 hover:underline">شروط استخدام LUMO</a> و <a href="#" class="text-purple-600 hover:underline">سياسة الخصوصية</a> الخاصة بطلاب ومؤسسات BTEC.
        </p>

    </div>

    <!-- Script file containing page logic -->
    <script>
        // State Management
        let currentAuthMode = 'login'; // 'login' or 'register'
        let currentRegisterRole = 'student'; // 'student' or 'company'

        // DOM elements
        const tabLoginBtn = document.getElementById('tab-login-btn');
        const tabRegisterBtn = document.getElementById('tab-register-btn');
        const authTabIndicator = document.getElementById('auth-tab-indicator');
        
        const loginForm = document.getElementById('login-form');
        const registerContainer = document.getElementById('register-container');
        
        const regStudentForm = document.getElementById('reg-student-form');
        const regCompanyForm = document.getElementById('reg-company-form');
        
        const alertBox = document.getElementById('alert-box');

        // Function to show custom alert message inside card
        function showAlert(message, type = 'success') {
            alertBox.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'bg-blue-100', 'text-blue-800');
            
            if (type === 'success') {
                alertBox.classList.add('bg-green-100', 'text-green-800');
            } else if (type === 'error') {
                alertBox.classList.add('bg-red-100', 'text-red-800');
            } else {
                alertBox.classList.add('bg-blue-100', 'text-blue-800');
            }
            
            alertBox.textContent = message;
            alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 5000);
        }

        // Helper to animate main card height changes smoothly
        function animateCardHeight(callback) {
            const card = document.getElementById('main-card');
            if (!card) {
                callback();
                return;
            }
            
            const prevHeight = card.offsetHeight;
            
            // Set overflow to hidden to prevent scrollbars during height change
            card.style.overflow = 'hidden';
            
            callback();
            
            // Get target height after change
            card.style.height = 'auto';
            const targetHeight = card.offsetHeight;
            
            // Set back to previous height immediately
            card.style.transition = 'none';
            card.style.height = prevHeight + 'px';
            
            // Force reflow
            card.offsetHeight;
            
            // Transition to target height
            card.style.transition = 'height 0.35s cubic-bezier(0.4, 0, 0.2, 1)';
            card.style.height = targetHeight + 'px';
            
            const onEnd = (e) => {
                if (e.propertyName === 'height') {
                    card.style.height = '';
                    card.style.transition = '';
                    card.style.overflow = '';
                    card.removeEventListener('transitionend', onEnd);
                }
            };
            card.addEventListener('transitionend', onEnd);
        }

        // Toggle Auth Mode (تسجيل دخول VS إنشاء حساب)
        function switchAuthMode(mode) {
            animateCardHeight(() => {
                currentAuthMode = mode;
                
                if (mode === 'login') {
                    // UI Tab changes
                    tabLoginBtn.classList.add('text-slate-800');
                    tabLoginBtn.classList.remove('text-slate-500');
                    tabRegisterBtn.classList.add('text-slate-500');
                    tabRegisterBtn.classList.remove('text-slate-800');
                    
                    // Align indicator to right (rtl layout) by manipulating inline "right" style
                    authTabIndicator.style.right = '4px';
                    
                    // Show/Hide forms
                    loginForm.classList.remove('hidden');
                    registerContainer.classList.add('hidden');
                } else {
                    // UI Tab changes
                    tabRegisterBtn.classList.add('text-slate-800');
                    tabRegisterBtn.classList.remove('text-slate-500');
                    tabLoginBtn.classList.add('text-slate-500');
                    tabLoginBtn.classList.remove('text-slate-800');
                    
                    // Slide indicator to left (rtl layout) - leaves exactly 4px margin from the left edge
                    authTabIndicator.style.right = '50%';
                    
                    // Show/Hide forms
                    loginForm.classList.add('hidden');
                    registerContainer.classList.remove('hidden');
                }
                // Clear alerts
                alertBox.classList.add('hidden');
            });
        }

        // Set register role with absolute placement logic (Smooth & fully resolved slide)
        function setRegisterRole(role) {
            animateCardHeight(() => {
                currentRegisterRole = role;
                const studentBtn = document.getElementById('reg-role-student');
                const companyBtn = document.getElementById('reg-role-company');
                const regRoleIndicator = document.getElementById('reg-role-indicator');

                if (role === 'student') {
                    // Adjust typography active/inactive states
                    studentBtn.classList.add('text-white');
                    studentBtn.classList.remove('text-slate-500');
                    companyBtn.classList.add('text-slate-500');
                    companyBtn.classList.remove('text-white');
                    
                    // Slide indicator to student (Right side in RTL)
                    regRoleIndicator.style.right = '4px';
                    
                    regStudentForm.classList.remove('hidden');
                    regCompanyForm.classList.add('hidden');
                } else {
                    // Adjust typography active/inactive states
                    companyBtn.classList.add('text-white');
                    companyBtn.classList.remove('text-slate-500');
                    studentBtn.classList.add('text-slate-500');
                    studentBtn.classList.remove('text-white');
                    
                    // Slide indicator to company (Left side in RTL) - leaves exactly 4px margin from the left edge
